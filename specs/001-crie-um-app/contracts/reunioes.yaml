openapi: 3.0.0
info:
  title: Meetings API Contracts
  version: 1.0.0
  description: Contratos para gestão de Reuniões de GCs

servers:
  - url: https://{project}.supabase.co/rest/v1
    variables:
      project:
        default: your-project

security:
  - bearerAuth: []

paths:
  /meetings:
    get:
      summary: Listar reuniões
      operationId: listMeetings
      parameters:
        - name: gc_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: data_hora
          in: query
          description: "Filtro por data (gte, lte, etc.)"
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            default: "data_hora.desc"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de reuniões
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Meeting'

    post:
      summary: Registrar nova reunião
      operationId: createMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreate'
      responses:
        '201':
          description: Reunião registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Sem permissão para registrar reunião neste GC

  /meetings/{id}:
    get:
      summary: Obter detalhes de uma reunião
      operationId: getMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: select
          in: query
          schema:
            type: string
            default: "*,attendance:meeting_attendance(*,member:members(*),visitor:visitors(*))"
      responses:
        '200':
          description: Detalhes da reunião com lista de presença
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingDetailed'

    patch:
      summary: Atualizar reunião
      operationId: updateMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdate'
      responses:
        '200':
          description: Reunião atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'

  /meeting_attendance:
    post:
      summary: Registrar presença em reunião
      operationId: createAttendance
      description: "Registra presença de membro OU visitante. Trigger automático incrementa visit_count e converte visitante se atingir threshold."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCreate'
      responses:
        '201':
          description: Presença registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '400':
          description: Dados inválidos (deve ter member_id OU visitor_id, não ambos)
        '409':
          description: Presença já registrada (duplicata)

    delete:
      summary: Remover presença
      operationId: deleteAttendance
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Presença removida

components:
  schemas:
    Meeting:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gc_id:
          type: string
          format: uuid
        licao_id:
          type: string
          format: uuid
          nullable: true
        data_hora:
          type: string
          format: date-time
          example: "2025-10-04T19:30:00Z"
        observacoes:
          type: string
          nullable: true
        registrado_por_user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    MeetingDetailed:
      allOf:
        - $ref: '#/components/schemas/Meeting'
        - type: object
          properties:
            attendance:
              type: array
              items:
                $ref: '#/components/schemas/Attendance'
            licao:
              $ref: '#/components/schemas/LessonBasic'

    MeetingCreate:
      type: object
      required:
        - gc_id
        - data_hora
        - registrado_por_user_id
      properties:
        gc_id:
          type: string
          format: uuid
        licao_id:
          type: string
          format: uuid
          nullable: true
        data_hora:
          type: string
          format: date-time
        observacoes:
          type: string
        registrado_por_user_id:
          type: string
          format: uuid
          description: "Normalmente auth.uid() do líder"

    MeetingUpdate:
      type: object
      properties:
        licao_id:
          type: string
          format: uuid
          nullable: true
        data_hora:
          type: string
          format: date-time
        observacoes:
          type: string

    Attendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        meeting_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
          nullable: true
        visitor_id:
          type: string
          format: uuid
          nullable: true
        attendance_type:
          type: string
          enum: [member, visitor]
        created_at:
          type: string
          format: date-time

    AttendanceCreate:
      type: object
      required:
        - meeting_id
        - attendance_type
      properties:
        meeting_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
          description: "Obrigatório se attendance_type=member"
        visitor_id:
          type: string
          format: uuid
          description: "Obrigatório se attendance_type=visitor"
        attendance_type:
          type: string
          enum: [member, visitor]

    LessonBasic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        titulo:
          type: string
        descricao:
          type: string
        referencias_biblicas:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string
        hint:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
