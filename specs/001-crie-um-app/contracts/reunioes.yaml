openapi: 3.0.0
info:
  title: Meetings API Contracts
  version: 1.1.0
  description: Contratos para gestão de Reuniões de GCs com presença de participantes e visitantes

servers:
  - url: https://{project}.supabase.co/rest/v1
    variables:
      project:
        default: your-project

security:
  - bearerAuth: []

paths:
  /meetings:
    get:
      summary: Listar reuniões
      operationId: listMeetings
      parameters:
        - name: gc_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: datetime
          in: query
          description: "Filtros por data (`gte`, `lte`, etc.)"
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            default: "datetime.desc"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de reuniões
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Meeting'

    post:
      summary: Registrar nova reunião
      operationId: createMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreate'
      responses:
        '201':
          description: Reunião registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Sem permissão para registrar reunião neste GC

  /meetings/{id}:
    get:
      summary: Obter detalhes de uma reunião
      operationId: getMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: select
          in: query
          schema:
            type: string
            default: "*,members:meeting_member_attendance(*,participant:growth_group_participants(*,person:people(*))),visitors:meeting_visitor_attendance(*,visitor:visitors(*,person:people(*))),lesson_template:lessons(*)"
      responses:
        '200':
          description: Detalhes da reunião com lista de presença
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingDetailed'

    patch:
      summary: Atualizar reunião
      operationId: updateMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdate'
      responses:
        '200':
          description: Reunião atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'

  /meeting_member_attendance:
    post:
      summary: Registrar presença de participante
      operationId: createMemberAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberAttendanceCreate'
      responses:
        '201':
          description: Presença registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberAttendance'
        '409':
          description: Participante já registrado nesta reunião

    delete:
      summary: Remover presença de participante
      operationId: deleteMemberAttendance
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Presença removida

  /meeting_visitor_attendance:
    post:
      summary: Registrar presença de visitante
      operationId: createVisitorAttendance
      description: Dispara trigger `auto_convert_visitor` para converter visitantes após N presenças.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitorAttendanceCreate'
      responses:
        '201':
          description: Presença registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorAttendance'
        '409':
          description: Visitante já registrado nesta reunião

    delete:
      summary: Remover presença de visitante
      operationId: deleteVisitorAttendance
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Presença removida

components:
  schemas:
    Meeting:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gc_id:
          type: string
          format: uuid
        lesson_template_id:
          type: string
          format: uuid
          nullable: true
        lesson_title:
          type: string
        datetime:
          type: string
          format: date-time
        comments:
          type: string
          nullable: true
        registered_by_user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    MeetingDetailed:
      allOf:
        - $ref: '#/components/schemas/Meeting'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/MemberAttendance'
            visitors:
              type: array
              items:
                $ref: '#/components/schemas/VisitorAttendance'
            lesson_template:
              $ref: '#/components/schemas/LessonBasic'

    MeetingCreate:
      type: object
      required:
        - gc_id
        - lesson_title
        - datetime
        - registered_by_user_id
      properties:
        gc_id:
          type: string
          format: uuid
        lesson_template_id:
          type: string
          format: uuid
          nullable: true
        lesson_title:
          type: string
        datetime:
          type: string
          format: date-time
        comments:
          type: string
          nullable: true
        registered_by_user_id:
          type: string
          format: uuid
          description: Normalmente `auth.uid()` do líder/supervisor

    MeetingUpdate:
      type: object
      properties:
        lesson_template_id:
          type: string
          format: uuid
          nullable: true
        lesson_title:
          type: string
        datetime:
          type: string
          format: date-time
        comments:
          type: string
          nullable: true
        registered_by_user_id:
          type: string
          format: uuid

    MemberAttendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        meeting_id:
          type: string
          format: uuid
        participant_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    MemberAttendanceCreate:
      type: object
      required:
        - meeting_id
        - participant_id
      properties:
        meeting_id:
          type: string
          format: uuid
        participant_id:
          type: string
          format: uuid

    VisitorAttendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        meeting_id:
          type: string
          format: uuid
        visitor_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    VisitorAttendanceCreate:
      type: object
      required:
        - meeting_id
        - visitor_id
      properties:
        meeting_id:
          type: string
          format: uuid
        visitor_id:
          type: string
          format: uuid

    LessonBasic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        link:
          type: string
          nullable: true

    Error:
      type: object
      properties:
        message:
          type: string
        hint:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
