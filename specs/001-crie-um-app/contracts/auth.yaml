openapi: 3.0.0
info:
  title: Auth API Contracts
  version: 1.0.0
  description: Contratos de autenticação via Supabase Auth

paths:
  /auth/v1/signup:
    post:
      summary: Cadastro de novo usuário
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - nome
              properties:
                email:
                  type: string
                  format: email
                  example: "lider@igreja.com"
                password:
                  type: string
                  minLength: 8
                  example: "senha123"
                nome:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: "João Silva"
      responses:
        '200':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  session:
                    $ref: '#/components/schemas/Session'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/v1/token:
    post:
      summary: Login com email e senha
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - grant_type
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                grant_type:
                  type: string
                  enum: [password]
                  example: "password"
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: "bearer"
                  expires_in:
                    type: integer
                    example: 3600
                  refresh_token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/v1/logout:
    post:
      summary: Logout do usuário
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout bem-sucedido
        '401':
          description: Não autenticado

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nome:
          type: string
        hierarchy_level:
          type: integer
          minimum: 0
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
        message:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
