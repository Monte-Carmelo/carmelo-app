openapi: 3.0.0
info:
  title: Growth Group Participants API Contracts
  version: 1.1.0
  description: Contratos para gestão de papéis (líder, co-líder, supervisor, membro) nos Grupos de Crescimento

servers:
  - url: https://{project}.supabase.co/rest/v1
    variables:
      project:
        default: your-project

security:
  - bearerAuth: []

paths:
  /growth_group_participants:
    get:
      summary: Listar participantes/papéis de GC
      operationId: listGrowthGroupParticipants
      parameters:
        - name: gc_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por GC
        - name: person_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por pessoa
        - name: role
          in: query
          schema:
            type: string
            enum: [leader, co_leader, supervisor, member]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, transferred]
        - name: select
          in: query
          schema:
            type: string
            default: "*,person:people(*),gc:growth_groups(name)"
      responses:
        '200':
          description: Lista de papéis por GC/pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Atribuir novo papel em GC
      operationId: createGrowthGroupParticipant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantCreate'
      responses:
        '201':
          description: Papel criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Papel duplicado (mesmo gc_id, person_id e role)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /growth_group_participants/{id}:
    patch:
      summary: Atualizar status/papel de participante
      operationId: updateGrowthGroupParticipant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantUpdate'
      responses:
        '200':
          description: Papel atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Remover papel de participante
      operationId: deleteGrowthGroupParticipant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Papel removido
        '400':
          description: Não é possível remover último líder/supervisor ativo do GC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    Participant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gc_id:
          type: string
          format: uuid
        person_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [leader, co_leader, supervisor, member]
        status:
          type: string
          enum: [active, inactive, transferred]
        joined_at:
          type: string
          format: date-time
        left_at:
          type: string
          format: date-time
          nullable: true
        added_by_user_id:
          type: string
          format: uuid
          nullable: true
        converted_from_visitor_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    ParticipantCreate:
      type: object
      required:
        - gc_id
        - person_id
        - role
      properties:
        gc_id:
          type: string
          format: uuid
        person_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [leader, co_leader, supervisor, member]
        status:
          type: string
          enum: [active, inactive, transferred]
          default: active
        joined_at:
          type: string
          format: date-time
          nullable: true
        added_by_user_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true

    ParticipantUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [leader, co_leader, supervisor, member]
        status:
          type: string
          enum: [active, inactive, transferred]
        left_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true

    Error:
      type: object
      properties:
        message:
          type: string
        hint:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Usuário não possui permissão para a ação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Registro não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
