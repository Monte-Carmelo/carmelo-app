openapi: 3.0.0
info:
  title: Growth Groups API Contracts
  version: 1.1.0
  description: Contratos para gestão de Grupos de Crescimento (GCs)

servers:
  - url: https://{project}.supabase.co/rest/v1
    variables:
      project:
        default: your-project

security:
  - bearerAuth: []

paths:
  /growth_groups:
    get:
      summary: Listar grupos de crescimento
      operationId: listGrowthGroups
      parameters:
        - name: select
          in: query
          schema:
            type: string
            default: "*,participants:growth_group_participants(*,person:people(*))"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, multiplying]
      responses:
        '200':
          description: Lista de GCs visíveis conforme RLS
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrowthGroup'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Criar novo grupo de crescimento
      operationId: createGrowthGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrowthGroupCreate'
      responses:
        '201':
          description: GC criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /growth_groups/{id}:
    get:
      summary: Obter detalhes de um GC
      operationId: getGrowthGroup
      parameters:
        - $ref: '#/components/parameters/GrowthGroupId'
        - name: select
          in: query
          schema:
            type: string
            default: |
              *,
              leaders:growth_group_participants(role.eq.leader,person:people(*)),
              co_leaders:growth_group_participants(role.eq.co_leader,person:people(*)),
              supervisors:growth_group_participants(role.eq.supervisor,person:people(*)),
              members:growth_group_participants(role.eq.member,person:people(*))
      responses:
        '200':
          description: Detalhes do GC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthGroupDetailed'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      summary: Atualizar grupo de crescimento
      operationId: updateGrowthGroup
      parameters:
        - $ref: '#/components/parameters/GrowthGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrowthGroupUpdate'
      responses:
        '200':
          description: GC atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Soft delete (desativar) GC
      operationId: deleteGrowthGroup
      parameters:
        - $ref: '#/components/parameters/GrowthGroupId'
      responses:
        '204':
          description: GC desativado
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /growth_groups/{id}/participants:
    get:
      summary: Listar participantes de um GC por papel
      operationId: listParticipantsByRole
      parameters:
        - $ref: '#/components/parameters/GrowthGroupId'
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [leader, co_leader, supervisor, member]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive, transferred]
            default: active
      responses:
        '200':
          description: Lista de participantes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    GrowthGroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    GrowthGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mode:
          type: string
          enum: [in_person, online, hybrid]
        address:
          type: string
          nullable: true
        weekday:
          type: integer
          nullable: true
        time:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, multiplying]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    GrowthGroupDetailed:
      allOf:
        - $ref: '#/components/schemas/GrowthGroup'
        - type: object
          properties:
            leaders:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            co_leaders:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            supervisors:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            members:
              type: array
              items:
                $ref: '#/components/schemas/Participant'

    GrowthGroupCreate:
      type: object
      required:
        - name
        - mode
        - status
      properties:
        name:
          type: string
        mode:
          type: string
          enum: [in_person, online, hybrid]
        address:
          type: string
          nullable: true
        weekday:
          type: integer
          nullable: true
        time:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, multiplying]

    GrowthGroupUpdate:
      type: object
      properties:
        name:
          type: string
        mode:
          type: string
          enum: [in_person, online, hybrid]
        address:
          type: string
          nullable: true
        weekday:
          type: integer
          nullable: true
        time:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, multiplying]

    Participant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gc_id:
          type: string
          format: uuid
        person_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [leader, co_leader, supervisor, member]
        status:
          type: string
          enum: [active, inactive, transferred]
        joined_at:
          type: string
          format: date-time
        left_at:
          type: string
          format: date-time
          nullable: true
        person:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
            phone:
              type: string
              nullable: true

    Error:
      type: object
      properties:
        message:
          type: string
        hint:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Usuário não possui permissão
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
