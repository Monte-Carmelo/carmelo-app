name: E2E Full

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_EMAIL: ${{ secrets.E2E_SUPABASE_EMAIL }}
      E2E_SUPABASE_PASSWORD: ${{ secrets.E2E_SUPABASE_PASSWORD }}
      E2E_SUPABASE_ADMIN_EMAIL: ${{ secrets.E2E_SUPABASE_ADMIN_EMAIL }}
      E2E_SUPABASE_ADMIN_PASSWORD: ${{ secrets.E2E_SUPABASE_ADMIN_PASSWORD }}
      E2E_SUPABASE_NON_ADMIN_EMAIL: ${{ secrets.E2E_SUPABASE_NON_ADMIN_EMAIL }}
      E2E_SUPABASE_NON_ADMIN_PASSWORD: ${{ secrets.E2E_SUPABASE_NON_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate required secrets
        run: |
          required=(
            "NEXT_PUBLIC_SUPABASE_URL"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY"
            "E2E_SUPABASE_EMAIL"
            "E2E_SUPABASE_PASSWORD"
            "E2E_SUPABASE_ADMIN_EMAIL"
            "E2E_SUPABASE_ADMIN_PASSWORD"
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret mapped to env: $key"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E subset
        run: npm run test:e2e:full

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-e2e-artifacts
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
