name: E2E Full

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_N7UND0UgjKTVK-Uodkm0Hg_xSvEMPvz
      E2E_SUPABASE_EMAIL: lider1@test.com
      E2E_SUPABASE_PASSWORD: senha123
      E2E_SUPABASE_ADMIN_EMAIL: admin@test.com
      E2E_SUPABASE_ADMIN_PASSWORD: senha123
      E2E_SUPABASE_NON_ADMIN_EMAIL: lider2@test.com
      E2E_SUPABASE_NON_ADMIN_PASSWORD: senha123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: .

      - name: Reset local Supabase database
        run: npm run db:reset

      - name: Seed auth users
        run: npm run db:seed-users

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E subset
        run: npm run test:e2e:full

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-e2e-artifacts
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
